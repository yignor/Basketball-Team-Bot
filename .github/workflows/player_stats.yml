name: Player Statistics

on:
  workflow_dispatch:
    inputs:
      person_id:
        description: 'PersonID в Infobasket (ваш ID: 400566)'
        required: true
        default: '400566'
        type: string
      chat_id:
        description: 'Telegram chat_id для отправки (по умолчанию — из секрета CHAT_ID)'
        required: false
        type: string

jobs:
  stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-github.txt

      - name: Generate player statistics
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ inputs.chat_id || secrets.CHAT_ID }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          echo "📊 Статистика игрока personId=${{ inputs.person_id }}"
          python player_stats.py --person-id ${{ inputs.person_id }}

      - name: Upload HTML report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: player-stats-${{ github.run_number }}
          path: stats_player_*.html
          if-no-files-found: warn
