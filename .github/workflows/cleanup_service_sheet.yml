name: Cleanup Service Sheet

on:
  schedule:
    # Запускаем каждый день в 02:00 UTC (05:00 МСК)
    - cron: '0 2 * * *'
  workflow_dispatch: # Позволяет запускать вручную для отладки

jobs:
  cleanup-service-sheet:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-github.txt

    - name: Run cleanup script
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      run: |
        echo "🧹 ЗАПУСК СКРИПТА ОЧИСТКИ СЕРВИСНОГО ЛИСТА"
        echo "=================================================="
        python cleanup_service_sheet.py
        echo "=================================================="
