name: Fallback Game Monitor

on:
  schedule:
    # Запуск каждый день в 08:00 UTC (11:00 по Москве) для проверки fallback источников
    - cron: '0 8 * * *'
    # Дополнительные запуски в 14:00 UTC (17:00 MSK) и 20:00 UTC (23:00 MSK)
    - cron: '0 14 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch: # Позволяет запускать вручную для отладки

jobs:
  fallback-monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-github.txt
        
    - name: Install Playwright browsers and system dependencies
      run: |
        python -m playwright install chromium
        python -m playwright install-deps chromium
        
    - name: Run Fallback Game Monitor
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        ANNOUNCEMENTS_TOPIC_ID: ${{ secrets.ANNOUNCEMENTS_TOPIC_ID }}
        GAMES_TOPIC_ID: ${{ secrets.GAMES_TOPIC_ID }}
        GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      run: |
        echo "🔍 Запуск мониторинга fallback-источников..."
        python fallback_game_monitor.py
        
    - name: Handle errors
      if: failure()
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: |
        echo "❌ Ошибка при выполнении fallback мониторинга"


