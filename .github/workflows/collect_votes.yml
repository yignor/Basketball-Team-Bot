name: Collect Training Votes

on:
  # Расписание отключено: реальное время голосований теперь обрабатывает
  # постоянный демон bot_daemon.py на сервере (long-polling). Параллельный
  # запуск этого скрипта вызывал "Conflict: terminated by other getUpdates
  # request" у демона. Оставлен только ручной запуск для отладки.
  workflow_dispatch:
    inputs:
      reason:
        description: 'Причина ручного запуска (опционально)'
        required: false
        type: string

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-github.txt

      - name: Collect poll_answer updates
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          echo "📥 Сбор голосов тренировок"
          python collect_votes.py
