name: Game Results Monitor V2

on:
  # Расписание отключено: тот же скрипт теперь запускается через cron
  # на постоянном сервере (deploy/basketball-cron) каждые 30 минут
  # круглосуточно. Параллельный запуск отсюда рисковал гонкой/дублями.
  workflow_dispatch: # Позволяет запускать вручную для отладки

jobs:
  monitor-game-results:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-github.txt
        
    - name: Run Game Results Monitor V2
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        ANNOUNCEMENTS_TOPIC_ID: ${{ secrets.ANNOUNCEMENTS_TOPIC_ID }}
        GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      run: |
        echo "🏀 Запуск системы мониторинга результатов игр V2..."
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          python run_game_results_monitor_final.py --force
        else
          python run_game_results_monitor_final.py
        fi
        
    - name: Handle errors
      if: failure()
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: |
        echo "❌ GitHub Actions завершился с ошибкой"
        echo "Проверка доступности переменных для отправки уведомления об ошибке..."
        
        if [ -z "$BOT_TOKEN" ]; then
          echo "⚠️ BOT_TOKEN недоступен для отправки уведомления об ошибке"
          echo "Добавьте BOT_TOKEN в GitHub Secrets для получения уведомлений об ошибках"
        fi
        
        if [ -z "$CHAT_ID" ]; then
          echo "⚠️ CHAT_ID недоступен для отправки уведомления об ошибке"
          echo "Добавьте CHAT_ID в GitHub Secrets для получения уведомлений об ошибках"
        fi
        
        echo "Ошибки будут отправлены в основной чат через скрипт"
        
    - name: Upload logs
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: game-results-monitor-v2-logs
        path: |
          *.log
